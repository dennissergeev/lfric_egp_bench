[template variables=VN]
compulsory=true
description=Apps version
help=The version number of the LFRic Apps release this suite is for, in "x.y" format.
sort-key=1a
type=character

[template variables=BUILD_LFRIC]
compulsory=true
description=Build the executable
help=Add or remove the build tasks from the flow graph
sort-key=1b
type=boolean

[template variables=CASE_SETUP]
compulsory=true
description=Case to run
help=Which exoplanet temperature forcing setup to run. Options are
    = <base>: deep hot Jupiter
    = shallow-hot-jupiter: shallow hot Jupiter
sort-key=2a
values='','shallow-hot-jupiter'
value-titles=Deep Hot Jupiter, Shallow Hot Jupiter

[template variables=COMPILER]
compulsory=true
description=Which compiler to use
help=CCE is preferred, as it is faster than GNU
    = CCE is available only on Monsoon for now
sort-key=4d
values='cce','gnu'
value-titles=CCE, GNU

[template variables=EXPT_DT]
compulsory=true
description=Model timestep (s)
help=Length of the model timestep in seconds
sort-key=2b
type=real

[template variables=EXPT_RESUB]
compulsory=true
description=Length of continuation runs
help=Length of each chunk the total model run length will be broken down into.
    = Given in cylc date-time format, e.g. PT1H
sort-key=3c
type=character

[template variables=EXPT_RUNLEN]
compulsory=true
description=Total run length
help=Total time which to run for
    = Given in cylc date-time format, e.g. P1D
sort-key=3b
type=character

[template variables=EXPT_START]
compulsory=true
description=Start date and time of run
help=Date and time at which to start the run
    = Given as a cylc time, e.g. YYYYMMDDTHHMMZ
sort-key=3a
type=character

[template variables=HOUSEKEEPING]
compulsory=true
description=Housekeeping
help=Remove clutter
sort-key=1c
type=boolean

[template variables=LFRIC_CPU]
compulsory=true
description=Wallclock time for each crun
help=Wallclock time to allocate to each continuation run. Max 3hrs
    = Given in cylc date-time format, e.g. PT1H
sort-key=4c
type=character

[template variables=LFRIC_LEVS]
compulsory=true
description=Vertical level set to use
help=Which vertical level set to use.
    = Levels with the 11000 km top are for the DHJ case (default: 66),
    = Levels with the 3300km top are for the SHJ case (default: 32)
sort-key=2d
values='l33_11000km', 'l44_11000km', 'l55_11000km', '', 'l77_11000km', 'l88_11000km', 'l99_11000km', 'l16_3300km', 'l32_3300km', 'l64_3300km'
value-titles=l33_11000km, l44_11000km, l55_11000km, l66_11000km, l77_11000km, l88_11000km, l99_11000km, l16_3300km, l32_3300km, l64_3300km

[template variables=LFRIC_RES]
compulsory=true
description=Horizontal mesh to use
help=Which horizontal resolution and domain size.
    = Options and max number of cores are:
    = C24_MG: 24 cells per panel | 54 PEs
    = C48_MG: 48 cells per panel | 216 PEs
    = C64_MG: 64 cells per panel | 384 PEs
    = C96_MG: 96 cells per panel | 864 PEs
    = C192_MG: 192 cells per panel | 864 PEs
    = C384_MG: 384 cells per panel | 864 PEs
sort-key=2c
values='C24_MG','C48_MG','C64_MG','C96_MG','C192_MG','C384_MG'
value-titles=C24, C48, C64, C96, C192, C384

[template variables=STRETCH_FACTOR]
compulsory=true
description=Mesh stretching factor
fail-if=this <= 0.0 ;
       =this > 1.0 ;
help=Must be greater than 0 and less than or equal to 1.
    =Automatically converted to equatorial_latitude accepted by the model.
range=0.0:1.0
sort-key=2d
type=real

[template variables=TARGET_LONLAT]
compulsory=true
description=Coordinates of the target pole in degrees
type=real
fail-if=this(1) < -180.0 ;
       =this(1) >  180.0 ;
       =this(2) < -90.0  ;
       =this(2) >  90.0  ;
help=Longitude and latitude of the focal point of stretching.
    =The mesh cells become smaller towards this point.
    =For more information, see the target_north_pole parameter in the mesh app.
length=2
range=-180.0:180.0
sort-key=2e
type=real

[template variables=PHYSICS_CONF]
compulsory=true
description=Which physics setup to use
help=Options are:
    = <base>: default global config
    = stability: extra settings for numerical stability
sort-key=2e
values='', 'stability'
value-titles=gal9, stability

[template variables=TOTAL_RANKS_REQ]
compulsory=true
description=How many processors to use
help=Total number of processors to place the model on. There are 128 per node
    = on the ex1a machine
sort-key=4b
type=integer

[jinja2:suite.rc=MIRROR_LOC]
compulsory=false
description=Location of github mirrors
help=HostName:Path format, pointing at github mirrors. Required if USE_MIRRORS
    =is true.
    =Default value is valid for MetOffice workflows
sort-key=1d

[jinja2:suite.rc=USE_MIRRORS]
compulsory=true
description=Use local github mirrors
help=Use local github mirrors to clone sources from. Default is true
sort-key=1d
type=boolean

[jinja2:suite.rc=USE_TOKENS]
compulsory=true
description=Github Authentication via github PATs
help=If true, switches sources to use https urls instead of ssh. This requires
    =a github personal access token to be setup to authenticate with github.
    =Default is false
sort-key=1d
type=boolean

[template variables=MO_EX_HOST]
compulsory=true
description=Which machine to run on
help=Met Office ex1a zones or Monsoon
sort-key=4a
values='exab','excd','ex'
value-titles=exab, excd, Monsoon